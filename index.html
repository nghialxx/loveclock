<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Clock</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
</head>
<body>
    <div id="clock">
        <div id="clock-number">0</div>
        <div id="clock-label">days</div>
    </div>

    <button id="milestone-btn" title="View Milestones">📅</button>

    <div id="milestone-popup">
        <h3>Our Milestones</h3>
        <div id="milestone-list"></div>
    </div>

    <div id="hint">click anywhere · move to collect ♥</div>

    <script src="script.js"></script>
</body>
</html>
